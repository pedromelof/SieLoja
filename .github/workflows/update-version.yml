name: Update Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment version
        run: |
          # Extrai o versionName e versionCode do arquivo build.gradle
          VERSION_NAME=$(grep -oP 'versionName "\K[0-9]+\.[0-9]+\.[0-9]+' app/build.gradle)
          VERSION_CODE=$(grep -oP 'versionCode \K[0-9]+' app/build.gradle)

          # Incrementa o patch do versionName (ex: 4.1.1 -> 4.1.2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION_NAME="$MAJOR.$MINOR.$NEW_PATCH"

          # Incrementa o versionCode
          NEW_VERSION_CODE=$((VERSION_CODE + 1))

          # Substitui no arquivo usando sed
          sed -i "s/versionName \"$VERSION_NAME\"/versionName \"$NEW_VERSION_NAME\"/" app/build.gradle
          sed -i "s/versionCode $VERSION_CODE/versionCode $NEW_VERSION_CODE/" app/build.gradle

          echo "Nova versão: $NEW_VERSION_NAME (Code: $NEW_VERSION_CODE)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add web/index.html

          git diff --cached --quiet && exit 0

          git commit -m "Increment version"
          git push
